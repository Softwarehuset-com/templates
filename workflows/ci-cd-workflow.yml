# CI/CD Template - Parallel Test + Docker → Deploy
# 
# Pattern:
#   4 parallel jobs (test + docker for backend/frontend)
#   → deploy after all pass
#
# Version Policy (altid nyeste LTS):
#   - .NET: 10.0 (mcr.microsoft.com/dotnet/sdk:10.0)
#   - Node: 24 (node:24)
#
# Customize: Replace {repo}, {backend-path}, {frontend-path}

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: code.core.ci
  IMAGE_PREFIX: code.core.ci/softwarehuset/{repo}

jobs:
  # ═══════════════════════════════════════════════════════════
  # PARALLEL: Test + Docker builds
  # ═══════════════════════════════════════════════════════════

  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:10.0
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: dotnet test {backend-path}/*.sln --verbosity normal

  backend-docker:
    name: Backend Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./{backend-path}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-backend:latest

  frontend-test:
    name: Frontend Tests
    runs-on: ubuntu-latest
    container:
      image: node:24
    defaults:
      run:
        working-directory: {frontend-path}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Run tests
        run: npm test -- --watch=false

  frontend-docker:
    name: Frontend Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.FORGEJO_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./{frontend-path}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}-frontend:latest

  # ═══════════════════════════════════════════════════════════
  # DEPLOY: After all tests + docker builds pass
  # ═══════════════════════════════════════════════════════════

  deploy-preview:
    name: Deploy Preview
    if: github.event_name == 'pull_request'
    needs: [backend-test, backend-docker, frontend-test, frontend-docker]
    runs-on: ubuntu-latest
    environment: preview
    steps:
      - name: Deploy to preview
        run: |
          echo "Deploying PR #${{ github.event.pull_request.number }}"
          # Add your deployment script here
          # e.g., kubectl, helm, or API call

  deploy-test:
    name: Deploy Test
    if: github.ref == 'refs/heads/main'
    needs: [backend-test, backend-docker, frontend-test, frontend-docker]
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Deploy to test environment
        run: |
          echo "Deploying to test"
          # Add your deployment script here

  deploy-prod:
    name: Deploy Production
    if: github.ref == 'refs/heads/main'
    needs: [deploy-test]
    runs-on: ubuntu-latest
    environment: production  # Requires manual approval in Forgejo
    steps:
      - name: Deploy to production
        run: |
          echo "Deploying to production"
          # Add your deployment script here
