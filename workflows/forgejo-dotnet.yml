# Template: .NET Backend CI/CD
# Usage: Copy to .forgejo/workflows/ci.yml and replace:
#   - APP_NAME: your app name (e.g. ai-bookkeeper)
#   - DOTNET_VERSION: 9.0 or 10.0
#   - TEST_FILTER: test category filter (or remove line)

name: APP_NAME

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE: code.core.ci/softwarehuset/APP_NAME

jobs:
  test:
    name: APP_NAME / test
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:DOTNET_VERSION
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git clone --depth=1 "https://djohn:${TOKEN}@code.core.ci/${{ github.repository }}.git" .
          git fetch origin "${{ github.ref }}" --depth=1
          git checkout FETCH_HEAD
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --filter 'TEST_FILTER'

  docker:
    name: APP_NAME / docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Login
        run: echo "${{ secrets.FORGEJO_TOKEN }}" | docker login code.core.ci -u ${{ github.actor }} --password-stdin
      - name: Build & Push
        run: |
          TAG=${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.number) || github.sha }}
          docker build -t ${{ env.IMAGE }}:${TAG} .
          docker push ${{ env.IMAGE }}:${TAG}
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            docker tag ${{ env.IMAGE }}:${TAG} ${{ env.IMAGE }}:latest
            docker push ${{ env.IMAGE }}:latest
          fi

  deploy:
    name: APP_NAME / deploy
    needs: [test, docker]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - run: echo "🚀 Deploy ${{ env.IMAGE }}:${{ github.sha }}"
