# =============================================================================
# .NET Test Template
# =============================================================================
# Auto-detects docker-compose.yml and spins up services if present.
# Combine with build-images.yml for Docker builds.
# =============================================================================

name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        run: |
          curl -sSL https://dot.net/v1/dotnet-install.sh | bash -s -- --channel 9.0
          echo "$HOME/.dotnet" >> $GITHUB_PATH

      - name: Start services
        run: |
          if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
            echo "📦 Found docker-compose, starting services..."
            docker-compose up -d
            sleep 5
          fi

      - name: Restore
        run: ~/.dotnet/dotnet restore

      - name: Build
        run: ~/.dotnet/dotnet build --no-restore

      - name: Test
        run: ~/.dotnet/dotnet test --no-build --verbosity normal --filter 'Category!=Live&Category!=Integration'

      - name: Stop services
        if: always()
        run: |
          if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
            docker-compose down
          fi
