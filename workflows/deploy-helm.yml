# =============================================================================
# Helm Deploy Template
# =============================================================================
# Deploy job using Helm upgrade --install. Combine with build-images.yml for
# full CI/CD.
#
# REQUIRES:
# - KUBE_CONFIG secret (base64 encoded kubeconfig)
#
# USAGE:
# 1. Copy deploy job to your ci.yml
# 2. Set NAMESPACE, RELEASE, CHART env vars
# 3. Override VALUES_FILE and CHART_VERSION as needed
# 4. Add needs: [docker] to run after build
# =============================================================================

name: deploy-helm

on:
  push:
    branches: [main]

env:
  NAMESPACE: myapp
  RELEASE: myapp
  CHART: oci://registry.example.com/charts/myapp
  CHART_VERSION: ""
  VALUES_FILE: values.yaml

jobs:
  deploy:
    name: deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Install Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Deploy
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          VERSION_FLAG=""
          if [ -n "${{ env.CHART_VERSION }}" ]; then
            VERSION_FLAG="--version ${{ env.CHART_VERSION }}"
          fi

          helm upgrade --install ${{ env.RELEASE }} ${{ env.CHART }} \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values ${{ env.VALUES_FILE }} \
            ${VERSION_FLAG} \
            --wait --timeout 5m
