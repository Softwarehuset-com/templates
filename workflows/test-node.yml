# =============================================================================
# Node.js Test Template
# =============================================================================
# Auto-detects docker-compose.yml and spins up services if present.
# Combine with build-images.yml for Docker builds.
# =============================================================================

name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        run: |
          curl -fsSL https://fnm.vercel.app/install | bash
          export PATH="$HOME/.local/share/fnm:$PATH"
          eval "$(fnm env)"
          fnm install 22
          fnm use 22
          echo "$HOME/.local/share/fnm/aliases/default/bin" >> $GITHUB_PATH

      - name: Start services
        run: |
          if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
            echo "📦 Found docker-compose, starting services..."
            docker-compose up -d
            sleep 5
          fi

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

      - name: Stop services
        if: always()
        run: |
          if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
            docker-compose down
          fi
