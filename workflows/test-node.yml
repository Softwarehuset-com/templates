# =============================================================================
# Node.js Test Template
# =============================================================================
# Test job only. Combine with build-images.yml for Docker builds.
#
# USAGE:
# 1. Copy test job to your ci.yml
# 2. Adjust commands if needed (npm/yarn/pnpm/bun)
# =============================================================================

name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    container:
      image: node:22
    steps:
      - name: Checkout
        env:
          TOKEN: ${{ secrets.FORGEJO_TOKEN }}
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git clone --depth=1 "https://djohn:${TOKEN}@code.core.ci/${{ github.repository }}.git" .
          git fetch origin "${{ github.ref }}" --depth=1
          git checkout FETCH_HEAD

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present
