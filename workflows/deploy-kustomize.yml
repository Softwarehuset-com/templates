# =============================================================================
# Kustomize Deploy Template
# =============================================================================
# Deploy job only. Combine with build-images.yml for full CI/CD.
#
# REQUIRES:
# - KUBE_CONFIG secret (base64 encoded kubeconfig)
# - k8s/prod/ directory with kustomization.yaml
#
# USAGE:
# 1. Copy deploy job to your ci.yml
# 2. Set NAMESPACE and DEPLOYMENT env vars
# 3. Add needs: [docker] to run after build
# =============================================================================

name: deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: code.core.ci/softwarehuset
  NAMESPACE: myapp
  DEPLOYMENT: myapp
  IMAGE: myapp

jobs:
  deploy:
    name: deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Deploy
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBE_CONFIG }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          
          cd k8s/prod
          kubectl kustomize . | kubectl apply -f -
          
          kubectl -n ${{ env.NAMESPACE }} set image \
            deployment/${{ env.DEPLOYMENT }} \
            web=${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ github.sha }}
          
          kubectl -n ${{ env.NAMESPACE }} rollout status \
            deployment/${{ env.DEPLOYMENT }} --timeout=120s
