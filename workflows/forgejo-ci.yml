# Forgejo CI/CD Template
# Works with: catthehacker runners + DinD + host network
#
# Required secrets:
# - FORGEJO_TOKEN: For pushing to Forgejo Packages registry
#
# Usage:
# 1. Copy to .forgejo/workflows/ci.yml
# 2. Adjust IMAGE_PREFIX, paths, and commands for your project

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: code.core.ci
  IMAGE_PREFIX: code.core.ci/softwarehuset/REPO_NAME  # <-- Change this

jobs:
  # ============================================
  # BACKEND TESTS (container-based)
  # ============================================
  backend-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/dotnet/sdk:9.0  # or node:22, golang:1.22, etc.
    defaults:
      run:
        working-directory: src  # <-- Adjust path
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --verbosity normal

  # ============================================
  # BACKEND DOCKER BUILD
  # ============================================
  backend-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Login to registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.FORGEJO_TOKEN }}" | docker login code.core.ci -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}-backend:latest \
            ./src  # <-- Adjust Dockerfile path
      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_PREFIX }}-backend:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}-backend:latest

  # ============================================
  # FRONTEND TESTS (container-based)
  # ============================================
  frontend-test:
    runs-on: ubuntu-latest
    container:
      image: node:22
    defaults:
      run:
        working-directory: frontend  # <-- Adjust path
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - run: npm ci
      - run: npm run build
      - run: npm test || true

  # ============================================
  # FRONTEND DOCKER BUILD
  # ============================================
  frontend-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Login to registry
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.FORGEJO_TOKEN }}" | docker login code.core.ci -u ${{ github.actor }} --password-stdin
      - name: Build image
        run: |
          docker build \
            -t ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }} \
            -t ${{ env.IMAGE_PREFIX }}-frontend:latest \
            ./frontend  # <-- Adjust Dockerfile path
      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          docker push ${{ env.IMAGE_PREFIX }}-frontend:${{ github.sha }}
          docker push ${{ env.IMAGE_PREFIX }}-frontend:latest

  # ============================================
  # DEPLOY (after all jobs pass)
  # ============================================
  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [backend-test, backend-docker, frontend-test, frontend-docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          echo "Deploying ${{ github.sha }}"
          # Add kubectl/helm commands here
