# =============================================================================
# Docker Multi-Image Build Template
# =============================================================================
# Language-agnostic template for building multiple Docker images.
#
# USAGE:
# 1. Copy to .forgejo/workflows/ci.yml
# 2. Set REGISTRY and IMAGES env vars
# 3. Optionally add test job before build
#
# IMAGE FORMAT: dockerfile|image-name|context (one per line)
#
# EXAMPLES:
#
# Single image:
#   IMAGES: |
#     ./Dockerfile|myapp|.
#
# Multi-image:
#   IMAGES: |
#     ./src/Dockerfile|api|./src
#     ./frontend/Dockerfile|frontend|./frontend
#     ./docs/Dockerfile|docs|./docs
#
# TAGGING:
#   - PR builds: pr-{number}
#   - Main builds: {sha} + latest
# =============================================================================

name: build

on:
  push:
    branches: [main]
  pull_request:

env:
  REGISTRY: code.core.ci/softwarehuset
  IMAGES: |
    ./Dockerfile|app|.

jobs:
  build:
    name: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        run: echo "${{ secrets.FORGEJO_TOKEN }}" | docker login code.core.ci -u djohn --password-stdin

      - name: Build & Push images
        run: |
          set -e
          
          # Determine tag based on event type
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            TAG="pr-${{ github.event.number }}"
          else
            TAG="${{ github.sha }}"
          fi
          
          IS_MAIN="${{ github.ref == 'refs/heads/main' }}"
          
          echo "${{ env.IMAGES }}" | grep -v '^[[:space:]]*$' | while IFS='|' read -r dockerfile image context; do
            # Trim whitespace
            dockerfile=$(echo "$dockerfile" | xargs)
            image=$(echo "$image" | xargs)
            context=$(echo "$context" | xargs)
            
            # Skip empty lines
            [ -z "$dockerfile" ] && continue
            
            FULL_IMAGE="${{ env.REGISTRY }}/${image}"
            
            echo ""
            echo "════════════════════════════════════════════════════════════"
            echo "🐳 Building: ${FULL_IMAGE}:${TAG}"
            echo "   Dockerfile: ${dockerfile}"
            echo "   Context:    ${context}"
            echo "════════════════════════════════════════════════════════════"
            
            docker build -f "${dockerfile}" -t "${FULL_IMAGE}:${TAG}" "${context}"
            docker push "${FULL_IMAGE}:${TAG}"
            
            if [ "$IS_MAIN" = "true" ]; then
              echo "📌 Tagging as latest"
              docker tag "${FULL_IMAGE}:${TAG}" "${FULL_IMAGE}:latest"
              docker push "${FULL_IMAGE}:latest"
            fi
            
            echo "✅ Done: ${FULL_IMAGE}:${TAG}"
          done
          
          echo ""
          echo "🎉 All images built successfully!"
