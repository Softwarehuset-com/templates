# Simple CI/CD Template (single service)
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

env:
  IMAGE: code.core.ci/softwarehuset/REPO_NAME  # <-- Change this

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:22  # or dotnet, golang, etc.
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - run: npm ci
      - run: npm run build
      - run: npm test

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
      - name: Login
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.FORGEJO_TOKEN }}" | docker login code.core.ci -u ${{ github.actor }} --password-stdin
      - name: Build & Push
        run: |
          docker build -t ${{ env.IMAGE }}:${{ github.sha }} -t ${{ env.IMAGE }}:latest .
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            docker push ${{ env.IMAGE }}:${{ github.sha }}
            docker push ${{ env.IMAGE }}:latest
          fi

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: [test, docker]
    runs-on: ubuntu-latest
    steps:
      - run: echo "Deploy ${{ github.sha }}"
