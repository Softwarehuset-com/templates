# =============================================================================
# Python Test Template
# =============================================================================
# Auto-detects docker-compose.yml and spins up services if present.
# Combine with build-images.yml for Docker builds.
# =============================================================================

name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip python3-venv

      - name: Start services
        run: |
          if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
            echo "📦 Found docker-compose, starting services..."
            docker-compose up -d
            sleep 5
          fi

      - name: Install
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install -r requirements.txt || pip install -e ".[dev]" || true

      - name: Lint
        run: |
          . .venv/bin/activate
          ruff check . || flake8 . || true

      - name: Test
        run: |
          . .venv/bin/activate
          pytest || python -m unittest discover || true

      - name: Stop services
        if: always()
        run: |
          if [ -f docker-compose.yml ] || [ -f docker-compose.yaml ]; then
            docker-compose down
          fi
