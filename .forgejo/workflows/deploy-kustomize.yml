name: deploy-kustomize

on:
  workflow_call:
    inputs:
      namespace:
        description: "Kubernetes namespace"
        type: string
        required: true
      kustomize-path:
        description: "Path to kustomization directory"
        type: string
        default: "k8s/prod"

jobs:
  deploy:
    name: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          wget -q "https://dl.k8s.io/release/v1.31.0/bin/linux/amd64/kubectl" -O /tmp/kubectl
          chmod +x /tmp/kubectl
          sudo mv /tmp/kubectl /usr/local/bin/

      - name: Setup kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config

      - name: Deploy
        run: |
          export TAG=$(echo "${{ github.sha }}" | head -c 7)
          export REGISTRY="code.core.ci/softwarehuset"

          cd "${{ inputs.kustomize-path }}"
          kubectl kustomize . | envsubst | kubectl apply -n "${{ inputs.namespace }}" -f -

          kubectl get deployments -n "${{ inputs.namespace }}" -o name | while read -r dep; do
            kubectl rollout status -n "${{ inputs.namespace }}" $dep --timeout=300s
          done
