services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sampledb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d sampledb"]
      interval: 2s
      timeout: 5s
      retries: 10
