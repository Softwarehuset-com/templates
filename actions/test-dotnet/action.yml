name: test-dotnet
description: "Build and test a .NET solution with optional docker compose services"

inputs:
  dotnet-channel:
    description: ".NET channel to install (e.g. 9.0, 10.0)"
    default: "9.0"
  solution-path:
    description: "Path to .sln/.slnx file (empty = auto-detect)"
    default: ""
  docker-compose:
    description: "Auto-detect and start docker compose if present (true/false)"
    default: "true"
  submodules:
    description: "Checkout with submodules (true/false)"
    default: "true"
  test-filter:
    description: "dotnet test filter expression"
    default: "Category!=Live&Category!=Integration"

runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
      with:
        submodules: ${{ inputs.submodules }}

    - name: Install .NET
      shell: bash
      run: |
        wget -q https://dot.net/v1/dotnet-install.sh -O /tmp/dotnet-install.sh
        bash /tmp/dotnet-install.sh --channel ${{ inputs.dotnet-channel }} --install-dir $HOME/.dotnet
        echo "$HOME/.dotnet" >> $GITHUB_PATH
        echo "DOTNET_ROOT=$HOME/.dotnet" >> $GITHUB_ENV
        $HOME/.dotnet/dotnet --version

    - name: Start docker compose
      id: docker
      if: inputs.docker-compose == 'true'
      shell: bash
      run: |
        COMPOSE_FILE=$(find . -maxdepth 3 -name "docker-compose.yml" -o -name "docker-compose.yaml" -o -name "compose.yml" -o -name "compose.yaml" | grep -v vendor | head -1)
        if [ -n "$COMPOSE_FILE" ]; then
          COMPOSE_DIR=$(dirname "$COMPOSE_FILE")
          echo "compose_dir=$COMPOSE_DIR" >> $GITHUB_OUTPUT
          echo "compose_found=true" >> $GITHUB_OUTPUT
          echo "Found compose file: $COMPOSE_FILE"
          cd "$COMPOSE_DIR"
          docker compose up -d
          sleep 5
          if docker compose ps | grep -q postgres; then
            for i in $(seq 1 30); do
              docker compose exec -T postgres pg_isready 2>/dev/null && break
              sleep 2
            done
            # Detect the random host port mapped to postgres 5432
            PG_PORT=$(docker compose port postgres 5432 | cut -d: -f2)
            if [ -n "$PG_PORT" ]; then
              echo "pg_port=$PG_PORT" >> $GITHUB_OUTPUT
              echo "Postgres available on host port: $PG_PORT"
            fi
          fi
        else
          echo "compose_found=false" >> $GITHUB_OUTPUT
          echo "No docker-compose file found, skipping"
        fi

    - name: Detect solution
      id: solution
      shell: bash
      run: |
        if [ -n "${{ inputs.solution-path }}" ]; then
          echo "path=${{ inputs.solution-path }}" >> $GITHUB_OUTPUT
        else
          SLN=$(find . -maxdepth 3 \( -name "*.sln" -o -name "*.slnx" \) | grep -v vendor | head -1)
          if [ -z "$SLN" ]; then
            echo "::error::No solution file found"
            exit 1
          fi
          echo "path=$SLN" >> $GITHUB_OUTPUT
          echo "Auto-detected solution: $SLN"
        fi

    - name: Restore
      shell: bash
      run: $HOME/.dotnet/dotnet restore "${{ steps.solution.outputs.path }}"

    - name: Build
      shell: bash
      run: $HOME/.dotnet/dotnet build "${{ steps.solution.outputs.path }}" --no-restore

    - name: Test
      shell: bash
      run: |
        FILTER="${{ inputs.test-filter }}"
        FILTER_FLAG=""
        if [ -n "$FILTER" ]; then
          FILTER_FLAG="--filter \"$FILTER\""
        fi
        # Override connection string with detected random port if available
        PG_PORT="${{ steps.docker.outputs.pg_port }}"
        if [ -n "$PG_PORT" ]; then
          export ConnectionStrings__DefaultConnection="Host=localhost;Port=${PG_PORT};Database=sampledb;Username=testuser;Password=testpass"
          echo "Using postgres on random port: $PG_PORT"
        fi
        eval $HOME/.dotnet/dotnet test "${{ steps.solution.outputs.path }}" --no-build --verbosity normal $FILTER_FLAG

    - name: Stop docker compose
      if: always() && steps.docker.outputs.compose_found == 'true'
      shell: bash
      run: |
        cd "${{ steps.docker.outputs.compose_dir }}"
        docker compose down || true
